version: "3.8"

# ===========================================
# AI CanvasPro - Docker Compose 部署配置
# ===========================================

services:
  canvaspro:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-canvaspro:latest
    container_name: ai-canvaspro
    restart: unless-stopped

    ports:
      # 外部访问端口:容器内端口
      # 外部 http://ai-canvas.feikay.cn:18777 -> NAT -> 192.168.123.252:8777 -> 容器内 8777
      - "8777:8777"

    environment:
      # ---- 服务绑定配置 ----
      - AIC_BIND_HOST=0.0.0.0
      - AIC_LAN_MODE=1
      - AICANVAS_PORT=8777
      # ---- 日志配置 ----
      # off: 静默 / basic: 标准HTTP日志 / verbose: 详细日志(含IP/UA)
      - AIC_LOG_LEVEL=${AIC_LOG_LEVEL:-basic}
      # ---- 安全配置 ----
      # 必须是浏览器实际访问的完整 URL（协议+域名+端口）
      # 外网通过 http://ai-canvas.feikay.cn:18777 访问
      - AIC_ALLOWED_ORIGINS=http://ai-canvas.feikay.cn:18777
      # 可选的本地访问令牌（设置后需在请求中携带）
      # - AIC_LOCAL_TOKEN=${AIC_LOCAL_TOKEN:-}
      # ---- 订阅授权配置 ----
      # 如需自定义订阅服务器地址（一般不需要）
      # - AIC_SUBSCRIPTION_API_BASE=${AIC_SUBSCRIPTION_API_BASE:-}
      # ---- 代理配置（可选）----
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}

    volumes:
      # 用户数据（画布项目、设置、API Key 配置）
      - /volume2/docker/ai-canvas/user:/app/user
      # 数据目录（上传文件、资源缩略图、工作流）
      - /volume2/docker/ai-canvas/data:/app/data
      # 输出目录（生成的图片、视频等输出文件）
      - /volume2/docker/ai-canvas/output:/app/output
      # 系统状态（设备标识，确保 installId / deviceId 在容器重建后不变）
      - /volume2/docker/ai-canvas/system-state:/root/.local/state/AI-CanvasPro

    # 资源限制（可选）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: "2G"
    #     reservations:
    #       cpus: "1"
    #       memory: "1G"

networks:
  default:
    name: ai-canvaspro-network
